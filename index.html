<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etch a sketch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jura:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Etch a sketch</h1>
    <div class="options">
      <button id="new-grid">Grid size</button>
      <button id="erase">Clear grid</button>
      <button id="rainbow">Rainbow</button>
      <button id="outline">Outline</button>
      <label for="color" id="color-wrapper">
        <input type="color" name="color" id="color" value="#121212" />
      </label>
    </div>
    <div class="container"></div>
  </body>
</html>
